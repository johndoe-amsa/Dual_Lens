<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dual Lens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header id="toolbar">
    <h1 class="app-title">Dual Lens</h1>

    <div class="toolbar-separator"></div>

    <div class="toolbar-section">
      <span class="toolbar-section-label">View</span>
      <div class="toolbar-group">
        <button id="btn-normal" class="btn btn-primary" aria-pressed="true">Normal</button>
        <button id="btn-split" class="btn btn-secondary" aria-pressed="false">Split</button>
      </div>
    </div>

    <div class="toolbar-separator"></div>

    <div class="toolbar-section">
      <span class="toolbar-section-label">Tools</span>
      <div class="toolbar-group">
        <button id="btn-sync" class="btn btn-secondary" aria-pressed="false">Sync</button>
        <button id="btn-diff" class="btn btn-secondary" aria-pressed="false">Diff</button>
      </div>
    </div>

    <div class="toolbar-separator"></div>

    <div class="toolbar-section">
      <span class="toolbar-section-label">Zoom</span>
      <div class="toolbar-group">
        <button id="btn-zoom-out" class="btn btn-secondary" aria-label="Zoom out">&minus;</button>
        <span id="zoom-level" class="label-mono">100%</span>
        <button id="btn-zoom-in" class="btn btn-secondary" aria-label="Zoom in">+</button>
        <button id="btn-reset" class="btn btn-secondary">Fit</button>
      </div>
    </div>

    <div class="toolbar-separator"></div>

    <button id="btn-theme" class="btn btn-secondary" aria-label="Toggle theme">&#9684;</button>
  </header>

  <main id="viewport">
    <div id="pane-a" class="pane">
      <canvas id="canvas-a"></canvas>
      <div class="drop-zone" id="drop-a">
        <span class="drop-label">IMAGE A</span>
        <p class="drop-text">Drop image or click to browse</p>
        <input type="file" accept="image/*" id="file-a" hidden>
      </div>
    </div>

    <div id="pane-b" class="pane">
      <canvas id="canvas-b"></canvas>
      <div class="drop-zone" id="drop-b">
        <span class="drop-label">IMAGE B</span>
        <p class="drop-text">Drop image or click to browse</p>
        <input type="file" accept="image/*" id="file-b" hidden>
      </div>
    </div>

    <div id="pane-overlay" class="pane" hidden>
      <canvas id="canvas-overlay"></canvas>
      <div id="split-divider">
        <div id="split-line"></div>
        <div id="split-handle">
          <svg width="8" height="16" viewBox="0 0 8 16" fill="none">
            <circle cx="2" cy="4" r="1.5" fill="currentColor"/>
            <circle cx="6" cy="4" r="1.5" fill="currentColor"/>
            <circle cx="2" cy="8" r="1.5" fill="currentColor"/>
            <circle cx="6" cy="8" r="1.5" fill="currentColor"/>
            <circle cx="2" cy="12" r="1.5" fill="currentColor"/>
            <circle cx="6" cy="12" r="1.5" fill="currentColor"/>
          </svg>
        </div>
      </div>
    </div>
  </main>

  <footer id="status-bar">
    <span id="status-a" class="label-mono">No image</span>
    <span id="status-diff" class="label-mono" hidden>Diff: 0.00%</span>
    <span id="status-b" class="label-mono">No image</span>
  </footer>

  <div id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
